apis:
  - aid: mercoa:mercoa-api
    name: Mercoa API
    description: REST API and SDK suite for embedding accounts payable and accounts receivable into vertical SaaS platforms. Exposes resources for entities, users, invoices, bills, vendors, approval policies, payment methods, and disbursements, with webhooks for event-driven workflows. Mercoa offers official SDKs for TypeScript, Python, and Java, plus React components and a hosted iFrame for white-labeled AP/AR experiences.
